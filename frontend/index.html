<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provenance Collector</title>
    <script>
      // Apply the persisted theme before first paint to avoid a light/dark
      // flash. Mirrors useThemePreference: key "provenance:themeMode",
      // default "system". Kept dependency-free and inline so it runs
      // synchronously ahead of the bundle.
      (function () {
        try {
          var mode = localStorage.getItem("provenance:themeMode") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
