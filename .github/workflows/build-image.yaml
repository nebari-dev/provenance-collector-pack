name: Build Image

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/build-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/build-image.yaml"
  release:
    types: [published]
  workflow_dispatch:

# Cancel in-flight PR builds when a new commit lands on the same PR; leave
# `main` pushes and releases alone so we never lose a release artifact mid-run.
concurrency:
  group: build-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Fork PRs can't read QUAY_USERNAME/QUAY_PASSWORD secrets and would fail at
    # the login step. Skip them entirely; the Test/lint workflows still verify
    # the Dockerfile builds via `docker build` in the integration job.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # Buildx needs the docker-container driver to attach OCI attestations
      # (sbom: true, provenance: mode=max). The default docker driver errors
      # out with "Attestation is not supported for the docker driver."
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            quay.io/nebari/provenance-collector
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Attach an SPDX SBOM and a SLSA provenance attestation as OCI
          # referrers on every build, in both registries. The collector's own
          # internal/verify/sbom.go and internal/verify/provenance.go look for
          # these via the OCI referrers API — without them, our own image would
          # show up as "no SBOM, no provenance" when scanned by us (#29).
          sbom: true
          provenance: mode=max
