name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Lint chart
        run: helm lint chart/

  publish-helm-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Update Chart version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml
          echo "Chart.yaml after version update:"
          cat chart/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package chart/ --destination dist/

      - name: Render release notes from template
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Preserve the existing release body (user-written "What's New" section)
          # and append the install instructions from the template
          EXISTING=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body 2>/dev/null || echo "")
          # Render template with version
          sed "s/\${VERSION}/${VERSION}/g" .github/release-template.md > /tmp/rendered-notes.md
          # If the release already has a body with "What's New", merge them
          if echo "$EXISTING" | grep -q "What's New"; then
            # Extract the What's New section from existing body
            WHATS_NEW=$(echo "$EXISTING" | sed -n '/## What'\''s New/,/## Installation/p' | sed '$ d')
            # Replace the placeholder in the template
            sed -i "/## What's New/{N;s/## What's New\n-/${WHATS_NEW}/;}" /tmp/rendered-notes.md 2>/dev/null || true
          fi
          gh release edit "${GITHUB_REF_NAME}" -F /tmp/rendered-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-helm-repository:
    name: Sync Chart to Helm Repository
    runs-on: ubuntu-latest
    needs: publish-helm-chart
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Update Chart version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml

      - name: Sync chart to helm-repository
        uses: nebari-dev/helm-repository/.github/actions/sync-chart@main
        with:
          chart-path: chart
          chart-name: provenance-collector
          token: ${{ secrets.NEBARI_HELM_REPO_TOKEN }}

  # Keep examples/*.yaml in sync with the released version so users who copy
  # them aren't pinned to a stale chart revision. Runs after the chart is
  # published; commits the rewritten files back to main with [skip ci] so the
  # bump doesn't trigger another release.
  stamp-examples:
    name: Stamp examples to release version
    runs-on: ubuntu-latest
    needs: publish-helm-chart
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp examples with release version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Stamping examples to ${VERSION}"
          # ArgoCD Application targetRevision (the existing case today).
          sed -i -E "s|^(\s*targetRevision:\s*)\"[^\"]*\"(.*)|\1\"${VERSION}\"\2|" examples/*.yaml || true
          # Quoted `tag: "..."` lines anywhere under examples/ — covers any
          # future helm.valuesObject.image.tag we add. Greedy on purpose:
          # examples/ only holds files we control, and no existing key
          # collision exists (only chart releases would land a `tag:` line
          # at any indent today).
          sed -i -E "s|^(\s+tag:\s*)\"[^\"]*\"(.*)|\1\"${VERSION}\"\2|" examples/*.yaml || true
          echo "--- diff ---"
          git diff examples/ || true

      - name: Commit and push to main
        run: |
          if git diff --quiet examples/; then
            echo "No example files needed updating."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/
          git commit -m "chore: stamp examples to ${{ github.event.release.tag_name }} [skip ci]"
          git push
