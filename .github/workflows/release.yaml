name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

  publish-helm-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update Chart version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml
          echo "Chart.yaml after version update:"
          cat chart/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package chart/ --destination dist/

      - name: Render release notes from template
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Preserve the existing release body (user-written "What's New" section)
          # and append the install instructions from the template
          EXISTING=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body 2>/dev/null || echo "")
          # Render template with version
          sed "s/\${VERSION}/${VERSION}/g" .github/release-template.md > /tmp/rendered-notes.md
          # If the release already has a body with "What's New", merge them
          if echo "$EXISTING" | grep -q "What's New"; then
            # Extract the What's New section from existing body
            WHATS_NEW=$(echo "$EXISTING" | sed -n '/## What'\''s New/,/## Installation/p' | sed '$ d')
            # Replace the placeholder in the template
            sed -i "/## What's New/{N;s/## What's New\n-/${WHATS_NEW}/;}" /tmp/rendered-notes.md 2>/dev/null || true
          fi
          gh release edit "${GITHUB_REF_NAME}" -F /tmp/rendered-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-helm-repository:
    name: Sync Chart to Helm Repository
    runs-on: ubuntu-latest
    needs: publish-helm-chart
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update Chart version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml

      - name: Sync chart to helm-repository
        uses: nebari-dev/helm-repository/.github/actions/sync-chart@main
        with:
          chart-path: chart
          chart-name: provenance-collector
          token: ${{ secrets.NEBARI_HELM_REPO_TOKEN }}
