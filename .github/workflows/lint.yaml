name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
        env:
          GOTOOLCHAIN: auto

      # configspec drift guards. checkenvs fails if any os.Getenv (or a name
      # passed to one of the config helpers) references a PROVENANCE_* /
      # KUBECONFIG name that isn't in internal/configspec.Vars. gendocs --check
      # fails if docs/configuration.md is stale relative to the spec. Together
      # they keep the docs and the code from drifting.
      - name: Verify configspec coverage
        run: go run ./hack/checkenvs

      - name: Verify docs/configuration.md is up to date
        run: go run ./hack/gendocs --check

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint chart/

      - name: Template chart (default values)
        run: helm template test chart/ --set nebariapp.enabled=false

      - name: Template chart (NebariApp enabled)
        run: helm template test chart/ --set nebariapp.enabled=true --set nebariapp.hostname=test.example.com

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Schema validation
        run: |
          helm template test chart/ --set nebariapp.enabled=false --set webUI.enabled=false \
            | kubeconform -strict -ignore-missing-schemas -summary
          helm template test chart/ --set webUI.enabled=true \
            | kubeconform -strict -ignore-missing-schemas -summary
