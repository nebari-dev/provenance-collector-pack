name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
        env:
          GOTOOLCHAIN: auto

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

      - name: Template chart (default values)
        run: helm template test chart/ --set nebariapp.enabled=false

      - name: Template chart (NebariApp enabled)
        run: helm template test chart/ --set nebariapp.enabled=true --set nebariapp.hostname=test.example.com

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Schema validation
        run: |
          helm template test chart/ --set nebariapp.enabled=false --set webUI.enabled=false \
            | kubeconform -strict -ignore-missing-schemas -summary
          helm template test chart/ --set webUI.enabled=true \
            | kubeconform -strict -ignore-missing-schemas -summary
