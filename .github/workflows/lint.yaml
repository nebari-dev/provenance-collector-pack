name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
        env:
          GOTOOLCHAIN: auto

      # configspec drift guards. checkenvs fails if any os.Getenv (or a name
      # passed to one of the config helpers) references a PROVENANCE_* /
      # KUBECONFIG name that isn't in internal/configspec.Vars. gendocs --check
      # fails if docs/configuration.md is stale relative to the spec. Together
      # they keep the docs and the code from drifting.
      - name: Verify configspec coverage
        run: go run ./hack/checkenvs

      - name: Verify docs/configuration.md is up to date
        run: go run ./hack/gendocs --check

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Lint chart
        run: helm lint chart/

      # frontend.enabled defaults to true and requires frontend.keycloak.url, so
      # the render/validate steps below supply it. The webUI.enabled=false case
      # also disables the frontend (its /api proxy target), so no url is needed.
      - name: Template chart (default values)
        run: helm template test chart/ --set nebariapp.enabled=false --set frontend.keycloak.url=https://keycloak.test.example.com

      - name: Template chart (NebariApp enabled)
        run: helm template test chart/ --set nebariapp.enabled=true --set nebariapp.hostname=test.example.com --set frontend.keycloak.url=https://keycloak.test.example.com

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Schema validation
        run: |
          helm template test chart/ --set nebariapp.enabled=false --set webUI.enabled=false \
            | kubeconform -strict -ignore-missing-schemas -summary
          helm template test chart/ --set webUI.enabled=true --set frontend.keycloak.url=https://keycloak.test.example.com \
            | kubeconform -strict -ignore-missing-schemas -summary

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.0.0
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Biome check
        run: npm run check
