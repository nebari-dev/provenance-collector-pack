name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/check-links.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/check-links.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# GitHub Pages deploy needs contents:read to check out, pages:write to publish,
# and id-token:write for the OIDC token that actions/deploy-pages exchanges.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time. Do not cancel a running deploy - it can leave the
# site in a half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Public URL the built site knows itself by. GitHub Pages serves org project
  # sites at https://<owner>.github.io/<repo>/, so BASE is /<repo>/ and SITE is
  # the origin.
  SITE: https://nebari-dev.github.io
  BASE: /provenance-collector-pack/

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright (mermaid rendering)
        run: npx playwright install --with-deps chromium
        working-directory: docs

      - name: Unit tests
        run: npm test
        working-directory: docs

      - name: Build
        run: npm run build
        working-directory: docs
        env:
          SITE: ${{ env.SITE }}
          BASE: ${{ env.BASE }}

      - name: Check internal links
        run: SKIP_BUILD=1 bash scripts/check-links.sh
        env:
          BASE: ${{ env.BASE }}

      # Pages artifact upload happens on every build (PR + push) so the artifact
      # is always available for inspection; only the main-branch deploy job
      # actually publishes it.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    # Only main-branch pushes actually publish. PR builds stop at the
    # build + link-check gate above.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
