name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "chart/**"
      - "Dockerfile"
      - "go.mod"
      - ".github/workflows/test-integration.yaml"

permissions:
  contents: write

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Nebari sandbox
        id: sandbox
        uses: nebari-dev/action-nebari-sandbox@v1
        with:
          profile: platform
          cluster-name: provenance-test
          resource-summary: "true"

      - name: Configure kubeconfig
        run: echo "KUBECONFIG=${{ steps.sandbox.outputs.kubeconfig }}" >> $GITHUB_ENV

      - name: Build and load image
        run: |
          docker build --build-arg VERSION=test -t provenance-collector:test .
          k3d image import provenance-collector:test --cluster provenance-test

      - name: Install provenance-collector chart
        run: |
          helm install provenance-test chart/ \
            --set image.repository=provenance-collector \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set config.reportOutput=pvc \
            --set config.reportConfigMap=provenance-report \
            --set persistence.enabled=true \
            --set config.verifySignatures=false \
            --set config.checkUpdates=false \
            --set config.helmEnabled=true \
            --set webUI.enabled=true

      - name: Wait for dashboard
        run: |
          kubectl wait --for=condition=available deployment/provenance-test-provenance-collector-web --timeout=120s

      - name: Run provenance collection
        run: |
          kubectl create job --from=cronjob/provenance-test-provenance-collector test-run
          kubectl wait --for=condition=complete job/test-run --timeout=300s

      - name: Wait for report availability
        run: |
          kubectl port-forward svc/provenance-test-provenance-collector-web 8080:8080 &
          sleep 3
          for i in $(seq 1 10); do
            COUNT=$(curl -sf http://localhost:8080/api/reports | jq 'length' 2>/dev/null || echo "0")
            if [ "$COUNT" -gt "0" ]; then
              echo "Report available (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Verify report output
        run: |
          echo "=== Job logs ==="
          kubectl logs job/test-run

          echo ""
          echo "=== Report via Dashboard API ==="
          REPORT=$(curl -sf http://localhost:8080/api/reports/latest)
          echo "$REPORT" | jq .

          echo "$REPORT" | jq -e '.metadata.generatedAt' > /dev/null
          echo "$REPORT" | jq -e '.summary.totalImages > 0' > /dev/null
          echo "$REPORT" | jq -e '.images | length > 0' > /dev/null

          echo ""
          echo "Integration test passed!"

      - name: Capture dashboard screenshots
        run: |
          npm install puppeteer
          mkdir -p docs/screenshots

          node << 'JSEOF'
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'],
            });

            const page = await browser.newPage();
            await page.setViewport({ width: 1440, height: 900 });

            await page.goto('http://localhost:8080', { waitUntil: 'networkidle0', timeout: 30000 });
            await new Promise(r => setTimeout(r, 2000));
            await page.screenshot({ path: 'docs/screenshots/dashboard-overview.png', fullPage: false });

            const row = await page.$('tr.clickable');
            if (row) {
              await row.click();
              await new Promise(r => setTimeout(r, 500));
              await page.screenshot({ path: 'docs/screenshots/dashboard-detail.png', fullPage: false });
            }

            await browser.close();
            console.log('Screenshots captured successfully');
          })();
          JSEOF

      - name: Commit screenshots
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "docs: update dashboard screenshots [skip ci]"
            git push
          fi

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: docs/screenshots/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          k3d cluster delete ${{ steps.sandbox.outputs.cluster-name || 'provenance-test' }}
          docker network rm ${{ steps.sandbox.outputs.network-name }} 2>/dev/null || true

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Job ==="
          kubectl describe job/test-run || true
          echo ""
          echo "=== Job logs ==="
          kubectl logs job/test-run || true
          echo ""
          echo "=== Dashboard logs ==="
          kubectl logs deployment/provenance-test-provenance-collector-web || true
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30
