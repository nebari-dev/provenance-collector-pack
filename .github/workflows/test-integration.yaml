name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "chart/**"
      - "Dockerfile"
      - "go.mod"
      - ".github/workflows/test-integration.yaml"

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: provenance-test

      # Build the collector image and load into kind
      - name: Build and load image
        run: |
          docker build --build-arg VERSION=test -t provenance-collector:test .
          kind load docker-image provenance-collector:test --name provenance-test

      # Deploy some workloads for the collector to discover
      - name: Deploy test workloads
        run: |
          kubectl create deployment nginx --image=nginx:1.27-alpine
          kubectl create deployment redis --image=redis:7-alpine
          kubectl wait --for=condition=available deployment/nginx deployment/redis --timeout=120s

      # Install the chart with ConfigMap output (no PVC needed for test)
      - name: Install provenance-collector chart
        run: |
          helm install provenance-test chart/ \
            --set image.repository=provenance-collector \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set config.reportOutput=configmap \
            --set config.reportConfigMap=provenance-report \
            --set persistence.enabled=false \
            --set config.verifySignatures=false \
            --set config.checkUpdates=false \
            --set config.helmEnabled=true

      # Trigger a manual run
      - name: Run provenance collection
        run: |
          kubectl create job --from=cronjob/provenance-test-provenance-collector test-run
          kubectl wait --for=condition=complete job/test-run --timeout=300s

      # Verify the report
      - name: Verify report output
        run: |
          echo "=== Job logs ==="
          kubectl logs job/test-run

          echo ""
          echo "=== Report ConfigMap ==="
          REPORT=$(kubectl get configmap provenance-report -o jsonpath='{.data.report\.json}')
          echo "$REPORT" | jq .

          # Validate report structure
          echo "$REPORT" | jq -e '.metadata.generatedAt' > /dev/null
          echo "$REPORT" | jq -e '.summary.totalImages > 0' > /dev/null
          echo "$REPORT" | jq -e '.images | length > 0' > /dev/null

          echo ""
          echo "Integration test passed!"

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Job ==="
          kubectl describe job/test-run || true
          echo ""
          echo "=== Job logs ==="
          kubectl logs job/test-run || true
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30
