name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "chart/**"
      - "Dockerfile"
      - "go.mod"
      - ".github/workflows/test-integration.yaml"
      - ".github/argo-apps/provenance-collector.yaml"

permissions:
  contents: write

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Nebari sandbox
        id: sandbox
        uses: nebari-dev/action-nebari-sandbox@v1
        with:
          profile: platform
          cluster-name: provenance-test
          resource-summary: "true"

      - name: Configure kubeconfig
        run: echo "KUBECONFIG=${{ steps.sandbox.outputs.kubeconfig }}" >> $GITHUB_ENV

      - name: Build and load image
        run: |
          docker build --build-arg VERSION=test -t provenance-collector:test .
          k3d image import provenance-collector:test --cluster provenance-test

      # add-software-pack@v1 (>= v1.0.3) waits for the Application CR to exist
      # and to reach status.health.status=Healthy by default (wait-for-application
      # and wait-healthy both default true). It also annotates nebari-root for a
      # refresh internally, so consumers don't need to poll or nudge themselves.
      - name: Register provenance-collector pack
        uses: nebari-dev/action-nebari-sandbox/add-software-pack@v1
        with:
          gitops-dir: ${{ steps.sandbox.outputs.gitops-dir }}
          app-name: provenance-collector
          chart-source: ./chart
          application-manifest: .github/argo-apps/provenance-collector.yaml

      - name: Wait for dashboard
        run: |
          kubectl wait --for=condition=available deployment/provenance-test-provenance-collector-web --timeout=120s

      - name: Run provenance collection
        run: |
          kubectl create job --from=cronjob/provenance-test-provenance-collector test-run
          kubectl wait --for=condition=complete job/test-run --timeout=300s

      - name: Wait for report availability
        run: |
          kubectl port-forward svc/provenance-test-provenance-collector-web 8080:8080 &
          sleep 3
          for i in $(seq 1 10); do
            COUNT=$(curl -sf http://localhost:8080/api/reports | jq 'length' 2>/dev/null || echo "0")
            if [ "$COUNT" -gt "0" ]; then
              echo "Report available (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Verify report output
        run: |
          echo "=== Job logs ==="
          kubectl logs job/test-run

          echo ""
          echo "=== Report via Dashboard API ==="
          REPORT=$(curl -sf http://localhost:8080/api/reports/latest)
          echo "$REPORT" | jq .

          echo "$REPORT" | jq -e '.metadata.generatedAt' > /dev/null
          echo "$REPORT" | jq -e '.summary.totalImages > 0' > /dev/null
          echo "$REPORT" | jq -e '.images | length > 0' > /dev/null

          echo ""
          echo "Integration test passed!"

      # Timeline scan-switch coverage (#19): deploy a second workload, trigger
      # another scan, and verify via the dashboard UI that picking each
      # timeline entry actually swaps the images table — not just the stat cards.
      #
      # We can't use `busybox` as the sentinel — the sandbox's platform profile
      # ships `nebari-landing-webapi`, which uses `busybox:1.36` as a sidecar.
      # That collides with the test's image and the "appeared between scans"
      # check can't distinguish the two reports. `traefik/whoami` is small,
      # single-purpose, and not bundled by any pack we ship.
      - name: Deploy second workload (timeline-switch setup)
        run: |
          kubectl create deployment timeline-sentinel \
            --image=traefik/whoami:v1.10.3
          kubectl wait --for=condition=available deployment/timeline-sentinel --timeout=120s

      - name: Run second provenance collection
        run: |
          kubectl create job --from=cronjob/provenance-test-provenance-collector test-run-2
          kubectl wait --for=condition=complete job/test-run-2 --timeout=300s

      - name: Wait for second report to land in the dashboard
        run: |
          for i in $(seq 1 20); do
            COUNT=$(curl -sf http://localhost:8080/api/reports | jq 'length' 2>/dev/null || echo "0")
            if [ "$COUNT" -ge "2" ]; then
              echo "Both reports visible (attempt $i, count=$COUNT)"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for the second report; current count=$COUNT"
          curl -sf http://localhost:8080/api/reports | jq .
          exit 1

      - name: Verify the two reports differ on the sentinel image
        run: |
          REPORTS=$(curl -sf http://localhost:8080/api/reports)
          NEWEST=$(echo "$REPORTS" | jq -r '.[0].filename')
          OLDEST=$(echo "$REPORTS" | jq -r '.[1].filename')
          echo "Newest: $NEWEST"
          echo "Oldest: $OLDEST"

          # The reports list is sorted DESC by generatedAt; the sentinel image
          # should be in the newer one only.
          NEW_HAS=$(curl -sf "http://localhost:8080/api/reports/$NEWEST" \
            | jq '[.images[].image] | any(test("traefik/whoami"))')
          OLD_HAS=$(curl -sf "http://localhost:8080/api/reports/$OLDEST" \
            | jq '[.images[].image] | any(test("traefik/whoami"))')

          echo "Newest contains traefik/whoami: $NEW_HAS"
          echo "Oldest contains traefik/whoami: $OLD_HAS"

          if [ "$NEW_HAS" != "true" ] || [ "$OLD_HAS" != "false" ]; then
            echo "API distinctness check failed — the bug cannot be tested if the"
            echo "two reports don't actually differ on disk."
            exit 1
          fi

      - name: Install Playwright
        working-directory: test/e2e
        run: |
          npm init -y > /dev/null
          npm install --no-save @playwright/test@1.48.2
          npx playwright install --with-deps chromium

      - name: Run dashboard e2e tests
        working-directory: test/e2e
        env:
          DASHBOARD_URL: http://localhost:8080
          TIMELINE_NEW_IMAGE: traefik/whoami
        run: npx playwright test --reporter=list

      # Always upload — videos and traces are recorded on every run, not just
      # on failure, so reviewers can see what the bot actually saw without
      # having to re-run anything locally.
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
          if-no-files-found: ignore
          retention-days: 14

      # Capture screenshots of the web dashboard.
      # Auto-doc artifact only — runs on push to main (committed back into
      # docs/screenshots/ by the next step). Skipped on PRs so that a broken
      # screenshot step does not block code review; UI-touching PRs that want
      # to preview the render should run this workflow locally or land it and
      # check the auto-doc commit afterwards.
      - name: Capture dashboard screenshots
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Install locally rather than globally so the inline node script
          # below can require('puppeteer') without NODE_PATH gymnastics.
          npm install puppeteer
          mkdir -p docs/screenshots

          node << 'JSEOF'
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'],
            });

            const page = await browser.newPage();
            await page.setViewport({ width: 1440, height: 900 });

            await page.goto('http://localhost:8080', { waitUntil: 'networkidle0', timeout: 30000 });
            await new Promise(r => setTimeout(r, 2000));
            await page.screenshot({ path: 'docs/screenshots/dashboard-overview.png', fullPage: false });

            const row = await page.$('tr.clickable');
            if (row) {
              await row.click();
              await new Promise(r => setTimeout(r, 500));
              await page.screenshot({ path: 'docs/screenshots/dashboard-detail.png', fullPage: false });
            }

            await browser.close();
            console.log('Screenshots captured successfully');
          })();
          JSEOF

      - name: Commit screenshots
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "docs: update dashboard screenshots [skip ci]"
            git push
          fi

      - name: Upload screenshots as artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-screenshots
          path: docs/screenshots/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          k3d cluster delete ${{ steps.sandbox.outputs.cluster-name || 'provenance-test' }}
          docker network rm ${{ steps.sandbox.outputs.network-name }} 2>/dev/null || true

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Jobs ==="
          kubectl describe job/test-run || true
          kubectl describe job/test-run-2 || true
          echo ""
          echo "=== Job logs ==="
          kubectl logs job/test-run || true
          kubectl logs job/test-run-2 || true
          echo ""
          echo "=== Dashboard logs ==="
          kubectl logs deployment/provenance-test-provenance-collector-web || true
          echo ""
          echo "=== Reports listing ==="
          curl -sf http://localhost:8080/api/reports | jq . || true
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30
