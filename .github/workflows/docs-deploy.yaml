name: Deploy docs site

# Spike: builds the Astro docs site under docs-site/ and publishes it to
# GitHub Pages. Path-filtered so it only runs when the docs site itself
# changes; other workflows (build-image, release, etc.) are unaffected.
on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-deploy.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-deploy.yaml"
  workflow_dispatch:

# Permissions needed by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          # No npm cache wiring yet — the spike ships package.json without a
          # lockfile so reviewers can re-resolve. Enable `cache: 'npm'` +
          # `cache-dependency-path: docs-site/package-lock.json` once the
          # lockfile is committed (and swap `npm install` → `npm ci` below).

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    # PRs build but don't publish — only push to main triggers a deploy.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
