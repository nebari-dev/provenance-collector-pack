{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "provenance-collector.fullname" . }}
  labels:
    {{- include "provenance-collector.labels" . | nindent 4 }}
rules:
  # Image discovery: list pods across namespaces
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list"]
  # Owner resolution: resolve pod -> replicaset -> deployment etc.
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  # Helm release discovery: Helm stores releases as secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Report output as ConfigMap (when reportOutput=configmap)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update"]
{{- end }}
