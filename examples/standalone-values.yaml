# Standalone deployment — no nebari-operator required.
#
# Deploy with:
#   helm install provenance-collector chart/ \
#     -f examples/standalone-values.yaml \
#     --namespace provenance-system --create-namespace

# Run daily at 6 AM UTC.
schedule: "0 6 * * *"

config:
  # Scan all namespaces (default).
  namespaces: []
  excludeNamespaces: []
  verifySignatures: true
  helmEnabled: true
  checkUpdates: true
  reportPath: /reports
  clusterName: my-cluster

persistence:
  # http: collector POSTs reports to the dashboard's internal endpoint.
  # The dashboard owns the PVC; no shared volume between pods. Works on
  # ReadWriteOnce storage classes like Hetzner csi.hetzner.cloud.
  mode: http
  storageClass: ""  # Optional, but recommended (uses the cluster default if empty).
  size: 1Gi

# webUI is required in http mode — it hosts both the read API/UI and the
# internal upload endpoint the collector POSTs to.
webUI:
  enabled: true

# No Nebari integration.
nebariapp:
  enabled: false
