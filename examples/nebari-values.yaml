# Nebari deployment — requires the nebari-operator, Envoy Gateway, and Keycloak.
#
# The target namespace must have the label:
#   nebari.dev/managed=true
#
# Deploy with:
#   helm install provenance-collector chart/ \
#     -f examples/nebari-values.yaml \
#     --namespace provenance-system --create-namespace

schedule: "0 6 * * *"

config:
  namespaces: []
  excludeNamespaces: []
  verifySignatures: true
  helmEnabled: true
  checkUpdates: true
  reportPath: /reports
  clusterName: ""  # Set to your cluster name.

persistence:
  # http mode is the safe default: only the dashboard pod mounts the volume,
  # so a ReadWriteOnce class (e.g. Hetzner csi.hetzner.cloud) is fine.
  mode: http
  storageClass: ""
  size: 1Gi

# Required in http mode — hosts UI + internal upload endpoint.
webUI:
  enabled: true

# Register with the nebari-operator and expose the public UI through the gateway.
# The internal upload Service ({fullname}-web-internal) is intentionally not
# routed here: it must stay cluster-only.
nebariapp:
  enabled: true
  hostname: provenance.example.com  # Replace with your hostname.
  service:
    port: 8080
  routing:
    tls:
      enabled: true
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    enforceAtGateway: true
    redirectURI: /oauth2/callback
    scopes:
      - openid
      - profile
      - email
      - groups
    groups: []  # Restrict access to specific groups if needed.
  landingPage:
    enabled: true
    displayName: "Provenance Collector"
    description: "Container image provenance and compliance reports"
    category: "Platform"
    priority: 10
    healthCheck:
      enabled: true
      path: /healthz
      intervalSeconds: 30
      timeoutSeconds: 5
